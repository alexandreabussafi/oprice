<!DOCTYPE html>

<head>
  <meta charset="utf-8" />

  <title>OPrice - Pricing System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* --- PRINT OPTIMIZATION --- */
    @media print {

      /* 1. Unlock layout constraints */
      html,
      body,
      #root {
        height: auto !important;
        overflow: visible !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      /* 2. Force Background Colors */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* 3. Paper Margins */
      @page {
        margin: 8mm;
        size: auto;
      }

      /* 4. Table Pagination */
      thead {
        display: table-header-group;
        /* Repeats header on new pages */
      }

      tr {
        page-break-inside: avoid;
        /* Prevents row splitting */
      }

      /* 5. Hide Scrollbars */
      ::-webkit-scrollbar {
        display: none;
      }
    }
  </style>
