<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OPrice - Pricing System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          // You can add custom colors here if needed
        }
      }
    }

    // Apply dark mode immediately to avoid flash
    if (localStorage.getItem('oprice-theme') === 'dark' ||
      (!localStorage.getItem('oprice-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <style>
    /* --- PRINT OPTIMIZATION --- */
    @media print {

      /* 1. Unlock layout constraints */
      html,
      body,
      #root {
        height: auto !important;
        overflow: visible !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      /* 2. Force Background Colors */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* 3. Paper Margins - Zero to allow flush header/footer images */
      @page {
        margin: 0;
        size: A4 portrait;
      }

      /* 4. Table Pagination */
      thead {
        display: table-header-group;
        /* Repeats header on new pages */
      }

      tr {
        page-break-inside: avoid;
        /* Prevents row splitting */
      }

      /* 5. Hide Scrollbars */
      ::-webkit-scrollbar {
        display: none;
      }
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
